# Shared app environment, referenced by both `php` and `worker` via a YAML anchor
# so the web process and the worker can never drift out of sync.
x-app-env: &app_env
  SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
  DEFAULT_URI: https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}
  APP_ENV: ${APP_ENV:-dev}
  # PostgreSQL 18.4 — serverVersion MUST match the engine so Doctrine emits correct SQL.
  DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-18.4}&charset=utf8
  # Valkey (Redis-compatible) — cache/sessions/locks, wired in Step 7.
  REDIS_URL: ${REDIS_URL:-redis://cache:6379}
  # RabbitMQ (AMQP) for Messenger — wired in Step 7. Composed from leaf vars (no nesting).
  MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-app}:${RABBITMQ_PASSWORD:-!ChangeMe!}@rabbitmq:5672/%2f/messages
  # Mercure (hub lives inside FrankenPHP/Caddy) — real-time, wired in Step 7.
  MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
  MERCURE_PUBLIC_URL: https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}/.well-known/mercure
  MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}

services:
  php:
    restart: unless-stopped
    environment:
      <<: *app_env
      # Consumed by the Caddy Mercure module.
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
    depends_on:
      database: { condition: service_healthy }
      cache: { condition: service_healthy }
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${HTTP_PORT:-80}:80"         # HTTP
      - "${HTTPS_PORT:-443}:443"      # HTTPS
      - "${HTTP3_PORT:-443}:443/udp"  # HTTP/3 (QUIC)

  worker:
    # Reuses the php image (built by the env override). Gated behind the "worker"
    # profile so it does NOT start with `make up` — we enable it in Step 7.
    profiles: ["worker"]
    restart: unless-stopped
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "--memory-limit=128M", "-vv"]
    environment:
      <<: *app_env
    depends_on:
      database: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  database:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      # Store data in a sub-dir of the volume — robust across image/version changes.
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql/data
    # ports: ["5432:5432"]   # uncomment to reach Postgres from a host GUI client

  cache:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - cache_data:/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-!ChangeMe!}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"   # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  caddy_data:
  caddy_config:
  database_data:
  cache_data:
  rabbitmq_data: