# Development overrides — Docker Compose merges this on top of compose.yaml automatically.
services:
  php:
    image: ${IMAGES_PREFIX:-}skeleton-api-php-dev
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - /app/var          # keep var/ off the bind mount for fast I/O on Mac/Windows
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      FRANKENPHP_SITE_CONFIG: hot_reload
      MERCURE_EXTRA_DIRECTIVES: demo
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  worker:
    image: ${IMAGES_PREFIX:-}skeleton-api-php-dev
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - /app/var
    environment:
      XDEBUG_MODE: "off"
###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5432"
###< doctrine/doctrine-bundle ###
