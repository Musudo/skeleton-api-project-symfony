framework:
    cache:
        # The "app" pool is your general-purpose cache (rate-limiter counters, Doctrine
        # result/query caches in prod, anything you store via CacheInterface).
        # Backed by Valkey, which speaks the Redis protocol — the php-redis extension
        # connects to it unchanged. REDIS_URL is injected by Compose (redis://cache:6379).
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

        # The "system" pool (compiled container, annotation/validation metadata) is left
        # on its default local adapter on purpose — it's deploy-local and faster.

        # Optional: stable seed so cache keys don't collide across apps sharing a Valkey.
        #prefix_seed: skeleton-api/app

        # Dedicated pools (if you ever want one isolated from "app"):
        #pools:
        #    my.dedicated.cache: null

# Tests use an in-process array cache: no Valkey dependency, and rate-limiter
# counters reset each run so they can't bleed between tests.
when@test:
    framework:
        cache:
            app: cache.adapter.array