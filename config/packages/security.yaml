security:
    password_hashers:
        App\User\Domain\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\User\Domain\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/v1/auth
            stateless: true
            json_login:
                check_path: /api/v1/auth
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api/v1
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        # First match wins, so public rules come before the catch-all.
        - { path: ^/api/v1/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/users, methods: [POST], roles: PUBLIC_ACCESS }   # open registration
        - { path: ^/api/v1, roles: IS_AUTHENTICATED_FULLY }

# Test env only needs the database name suffixed; everything above is inherited.
when@test:
    security:
        password_hashers:
            # Speed up the hasher in tests so the suite isn't slow.
            App\User\Domain\User:
                algorithm: auto
                cost: 4          # bcrypt
                time_cost: 3     # argon
                memory_cost: 10